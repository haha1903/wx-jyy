name: build-deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/haha1903/wx-jyy:latest
            ghcr.io/haha1903/wx-jyy:${{ github.sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get kubeconfig
        run: az aks get-credentials -g hai -n haiaks --overwrite-existing

      - name: Rollout
        run: |
          kubectl -n wx-jyy set image deploy/wx-jyy wx-jyy=ghcr.io/haha1903/wx-jyy:${{ github.sha }}
          kubectl -n wx-jyy rollout status deploy/wx-jyy --timeout=180s
