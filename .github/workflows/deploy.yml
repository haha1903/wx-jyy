name: deploy
on:
  push:
    branches: [master]
    paths:
      - 'manifests/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get kubeconfig
        run: az aks get-credentials -g hai -n haiaks --overwrite-existing

      - name: Apply manifests
        run: |
          kubectl -n wx-jyy apply -f manifests/
          kubectl -n wx-jyy rollout status deploy/mariadb --timeout=180s
          kubectl -n wx-jyy rollout status deploy/wx-jyy --timeout=180s
