apiVersion: apps/v1
kind: Deployment
metadata:
  name: wx-jyy
  namespace: wx-jyy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wx-jyy
  template:
    metadata:
      labels:
        app: wx-jyy
    spec:
      containers:
        - name: wordpress
          image: wordpress:6-php8.3-apache
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb:3306
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: db-password
            - name: WORDPRESS_AUTH_KEY
              valueFrom: { secretKeyRef: { name: wp-secrets, key: AUTH_KEY } }
            - name: WORDPRESS_SECURE_AUTH_KEY
              valueFrom: { secretKeyRef: { name: wp-secrets, key: SECURE_AUTH_KEY } }
            - name: WORDPRESS_LOGGED_IN_KEY
              valueFrom: { secretKeyRef: { name: wp-secrets, key: LOGGED_IN_KEY } }
            - name: WORDPRESS_NONCE_KEY
              valueFrom: { secretKeyRef: { name: wp-secrets, key: NONCE_KEY } }
            - name: WORDPRESS_AUTH_SALT
              valueFrom: { secretKeyRef: { name: wp-secrets, key: AUTH_SALT } }
            - name: WORDPRESS_SECURE_AUTH_SALT
              valueFrom: { secretKeyRef: { name: wp-secrets, key: SECURE_AUTH_SALT } }
            - name: WORDPRESS_LOGGED_IN_SALT
              valueFrom: { secretKeyRef: { name: wp-secrets, key: LOGGED_IN_SALT } }
            - name: WORDPRESS_NONCE_SALT
              valueFrom: { secretKeyRef: { name: wp-secrets, key: NONCE_SALT } }
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('FS_METHOD', 'direct');
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                  $_SERVER['HTTPS'] = 'on';
                }
          ports:
            - containerPort: 80
          volumeMounts:
            - name: uploads
              mountPath: /var/www/html
            - name: apache-mpm
              mountPath: /etc/apache2/mods-enabled/mpm_prefork.conf
              subPath: mpm_prefork.conf
          resources:
            requests:
              cpu: 10m
              memory: 150Mi
            limits:
              memory: 350Mi
          readinessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: wx-jyy-uploads
        - name: apache-mpm
          configMap:
            name: apache-mpm-prefork
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-mpm-prefork
  namespace: wx-jyy
data:
  mpm_prefork.conf: |
    <IfModule mpm_prefork_module>
        StartServers            1
        MinSpareServers         1
        MaxSpareServers         2
        MaxRequestWorkers       8
        MaxConnectionsPerChild  500
    </IfModule>
