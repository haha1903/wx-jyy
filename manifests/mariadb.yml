apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wx-jyy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: db-root-password
            - name: MARIADB_DATABASE
              value: wordpress
            - name: MARIADB_USER
              value: wordpress
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: db-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mariadb-admin ping -uroot -p${MARIADB_ROOT_PASSWORD}"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wx-jyy-db
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wx-jyy
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
