apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wx-jyy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          args:
            - --default-authentication-plugin=mysql_native_password
            - --innodb-buffer-pool-size=64M
            - --key-buffer-size=8M
            - --innodb-log-buffer-size=4M
            - --tmp-table-size=8M
            - --max-heap-table-size=8M
            - --max-connections=30
            - --thread-cache-size=8
            - --table-open-cache=200
            - --performance-schema=OFF
          resources:
            requests:
              cpu: 10m
              memory: 80Mi
            limits:
              memory: 150Mi
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: db-root-password
            - name: MARIADB_DATABASE
              value: wordpress
            - name: MARIADB_USER
              value: wordpress
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wp-secrets
                  key: db-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mariadb-admin ping -uroot -p${MARIADB_ROOT_PASSWORD}"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wx-jyy-db
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wx-jyy
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
